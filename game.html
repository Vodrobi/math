<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Operations Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .operation-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .op-btn {
            padding: 12px;
            background: #f0f0ff;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: #555;
        }

        .op-btn:hover {
            background: #e8e8ff;
            border-color: #667eea;
        }

        .op-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .display-section {
            background: #f8f9ff;
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .prompt-text {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .number-display {
            font-size: 3rem;
            font-weight: bold;
            color: #667eea;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
        }

        input:focus {
            border-color: #667eea;
        }

        button#checkBtn {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button#checkBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button#checkBtn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result {
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
            font-size: 1.1rem;
            font-weight: 600;
            display: none;
        }

        .result.show {
            display: block;
        }

        .correct {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .incorrect {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .refresh-text {
            color: #666;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
        }

        .refresh-text.show {
            display: block;
        }

        @media (max-width: 400px) {
            .container {
                padding: 1.5rem;
            }
            
            .operation-buttons {
                gap: 8px;
            }
            
            .op-btn {
                padding: 10px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Math Operations</h1>
        
        <div class="operation-buttons">
            <button class="op-btn active" data-op="square">square</button>
            <button class="op-btn" data-op="squareroot">sqre. root</button>
            <button class="op-btn" data-op="cube">cube</button>
            <button class="op-btn" data-op="cuberoot">cube root</button>
        </div>

        <div class="display-section">
            <div class="prompt-text" id="promptText">Find the square of:</div>
            <div class="number-display" id="numberDisplay">25</div>
        </div>

        <div class="input-group">
            <input type="number" id="userInput" placeholder="Enter your answer..." autofocus>
        </div>

        <button id="checkBtn">Check Answer</button>
        
        <div class="result" id="result"></div>
        <div class="refresh-text" id="refreshText">Loading next question...</div>
    </div>

    <script>
        let currentOperation = 'square';
        let currentNumber;
        let currentAnswer;
        let isProcessing = false;

        function generateNumber(operation) {
            switch(operation) {
                case 'square':
                    return Math.floor(Math.random() * 60) + 1;
                case 'squareroot':
                    // Generate perfect square between 1 and 3600 (60˛)
                    const root = Math.floor(Math.random() * 60) + 1;
                    return root * root;
                case 'cube':
                    return Math.floor(Math.random() * 20) + 1;
                case 'cuberoot':
                    // Generate perfect cube between 1 and 8000 (20ł)
                    const cubeRoot = Math.floor(Math.random() * 20) + 1;
                    return cubeRoot * cubeRoot * cubeRoot;
            }
        }

        function calculateAnswer(number, operation) {
            switch(operation) {
                case 'square':
                    return number * number;
                case 'squareroot':
                    return Math.sqrt(number);
                case 'cube':
                    return number * number * number;
                case 'cuberoot':
                    return Math.cbrt(number);
            }
        }

        function getPromptText(operation) {
            switch(operation) {
                case 'square':
                    return 'Find the square of:';
                case 'squareroot':
                    return 'Find the square root of:';
                case 'cube':
                    return 'Find the cube of:';
                case 'cuberoot':
                    return 'Find the cube root of:';
            }
        }

        function initGame() {
            currentNumber = generateNumber(currentOperation);
            currentAnswer = calculateAnswer(currentNumber, currentOperation);
            
            document.getElementById('promptText').textContent = getPromptText(currentOperation);
            document.getElementById('numberDisplay').textContent = currentNumber;
            document.getElementById('userInput').value = '';
            document.getElementById('result').className = 'result';
            document.getElementById('result').textContent = '';
            document.getElementById('refreshText').className = 'refresh-text';
            document.getElementById('userInput').disabled = false;
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('userInput').focus();
            isProcessing = false;
        }

        function showResult(message, isCorrect) {
            const resultEl = document.getElementById('result');
            const displayAnswer = Number.isInteger(currentAnswer) ? currentAnswer : currentAnswer.toFixed(2);
            resultEl.textContent = `${message} ${isCorrect ? '' : `(Answer: ${displayAnswer})`}`;
            resultEl.className = `result show ${isCorrect ? 'correct' : 'incorrect'}`;
        }

        function handleCheck() {
            if (isProcessing) return;
            
            const userInput = document.getElementById('userInput');
            const inputValue = parseFloat(userInput.value);

            if (isNaN(inputValue)) {
                showResult('Please enter a number', false);
                return;
            }

            isProcessing = true;
            userInput.disabled = true;
            document.getElementById('checkBtn').disabled = true;

            const roundedAnswer = Math.round(currentAnswer * 100) / 100;
            const roundedInput = Math.round(inputValue * 100) / 100;
            const isCorrect = Math.abs(roundedInput - roundedAnswer) < 0.01;

            if (isCorrect) {
                showResult('Correct!', true);
            } else {
                showResult('Incorrect', false);
            }

            document.getElementById('refreshText').className = 'refresh-text show';

            setTimeout(() => {
                initGame();
            }, 2000);
        }

        function setOperation(operation) {
            if (isProcessing) return;
            
            currentOperation = operation;
            
            document.querySelectorAll('.op-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-op="${operation}"]`).classList.add('active');
            
            initGame();
        }

        // Event listeners
        document.querySelectorAll('.op-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                setOperation(btn.dataset.op);
            });
        });

        document.getElementById('checkBtn').addEventListener('click', handleCheck);
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleCheck();
            }
        });

        // Initialize game
        initGame();
    </script>
</body>
</html>
